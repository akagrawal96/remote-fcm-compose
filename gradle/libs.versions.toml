[versions]
agp = "9.0.1"
ksp = "2.2.10-2.0.2"
# Compose BOM — latest Feb 2026
composeBom = "2026.02.00"
# AndroidX Core
coreKtx = "1.17.0"
lifecycleRuntime = "2.10.0"
activityCompose = "1.12.4"
navigationCompose = "2.9.7"
kotlin = "2.3.10"
# Testing
junit = "4.13.2"

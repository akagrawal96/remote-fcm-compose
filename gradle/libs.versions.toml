espressoCore = "3.7.0"
mockk = "1.14.9"
# Hilt DI
hilt = "2.59.2"
hiltNavigationCompose = "1.3.0"
#Firebase
firebaseBom = "33.7.0"
# Network
retrofit = "3.0.0"
okhttp = "5.3.2"
gson = "2.13.2"
# Room
room = "2.8.4"
# Coil 3
coil = "3.3.0"
